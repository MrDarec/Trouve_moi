version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: trouvemoi-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret123}
      MONGO_INITDB_DATABASE: trouvemoi
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - trouvemoi-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trouvemoi-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret123}@mongodb:27017/trouvemoi?authSource=admin
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - trouvemoi-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trouvemoi-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - trouvemoi-net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: trouvemoi-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - trouvemoi-net

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local

networks:
  trouvemoi-net:
    driver: bridge
